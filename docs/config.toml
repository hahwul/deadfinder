# =============================================================================
# Site Configuration
# =============================================================================

title = "DeadFinder"
description = "Find dead (broken) links in web pages, URL lists, and sitemaps."
base_url = "https://hahwul.github.io/deadfinder"

# =============================================================================
# Plugins
# =============================================================================

[plugins]
processors = ["markdown"]

# =============================================================================
# Content Files
# =============================================================================

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

# =============================================================================
# Syntax Highlighting
# =============================================================================

[highlight]
enabled = true
theme = "monokai"
use_cdn = true

# =============================================================================
# Taxonomies
# =============================================================================

[[taxonomies]]
name = "tags"
feed = true
sitemap = false

# =============================================================================
# Sitemap
# =============================================================================

[sitemap]
enabled = true
filename = "sitemap.xml"
changefreq = "weekly"
priority = 0.5

# =============================================================================
# Markdown Configuration
# =============================================================================

[markdown]
safe = false
lazy_loading = false
emoji = false

# =============================================================================
# Search (client-side, Fuse.js)
# =============================================================================

[search]
enabled = true
format = "fuse_json"
fields = ["title", "content", "description"]
filename = "search.json"
