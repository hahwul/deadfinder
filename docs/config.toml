# =============================================================================
# Site Configuration
# =============================================================================

title = "DeadFinder"
description = "Find dead (broken) links in web pages, URL lists, and sitemaps."
base_url = "https://deadfinder.hahwul.com"

# =============================================================================
# Plugins
# =============================================================================

[plugins]
processors = ["markdown"]

# =============================================================================
# Content Files
# =============================================================================

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

# =============================================================================
# Syntax Highlighting
# =============================================================================

[highlight]
enabled = true
theme = "monokai"
use_cdn = true

# =============================================================================
# Taxonomies
# =============================================================================

[[taxonomies]]
name = "tags"
feed = true
sitemap = false

# =============================================================================
# Sitemap
# =============================================================================

[sitemap]
enabled = true
filename = "sitemap.xml"
changefreq = "weekly"
priority = 0.5

# =============================================================================
# Markdown Configuration
# =============================================================================

[markdown]
safe = false
lazy_loading = false
emoji = false

# =============================================================================
# Search (client-side, Fuse.js)
# =============================================================================

[search]
enabled = true
format = "fuse_json"
fields = ["title", "content", "description"]
filename = "search.json"

# =============================================================================
# OpenGraph & Twitter Cards
# =============================================================================
# Default meta tags for social sharing. Page-level front matter overrides.

[og]
type = "website"
twitter_card = "summary_large_image"
# twitter_site = "@hahwul"
# twitter_creator = "@hahwul"

# =============================================================================
# Auto OG Images
# =============================================================================
# Auto-generate 1200x630 OG preview images for pages without a custom `image`.
# https://hwaro.hahwul.com/features/og-images/

[og.auto_image]
enabled = true
format = "png"
background = "#0a0f0a"
text_color = "#e8ede8"
accent_color = "#22c55e"
font_size = 52
style = "dots"
pattern_opacity = 0.12
pattern_scale = 1.0
logo = "static/images/deadfinder-light.png"
logo_position = "bottom-left"
output_dir = "og-images"
show_title = true

# =============================================================================
# Pagination (Optional)
# =============================================================================

# [pagination]
# enabled = false
# per_page = 10

# =============================================================================
# Series (Optional)
# =============================================================================
# Group posts into ordered series

# [series]
# enabled = true

# =============================================================================
# Related Posts (Optional)
# =============================================================================
# Recommend related content based on shared taxonomy terms

# [related]
# enabled = true
# limit = 5
# taxonomies = ["tags"]

# =============================================================================
# Robots.txt
# =============================================================================
# Controls search engine crawler access

[robots]
enabled = true
filename = "robots.txt"
rules = [
  { user_agent = "*", allow = ["/"] }
]

# =============================================================================
# LLMs.txt
# =============================================================================
# Instructions for AI/LLM crawlers

[llms]
enabled = true
filename = "llms.txt"
instructions = "This is documentation for DeadFinder, an open-source CLI that finds broken links in web pages, URL lists, and sitemaps. Content is MIT-licensed."
full_enabled = true
full_filename = "llms-full.txt"

